<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso à lista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="card auth-card">
        <div class="hero-brand hero-brand-center">
          <img class="brand-logo" src="/img/Selmi_logo.jpg" alt="Selmi" />
          <div>
            <p class="eyebrow"><strong>Selmi</strong> — Safra Agricultores</p>
            <h1>Acesso restrito</h1>
          </div>
        </div>
        <p class="lead">Digite a senha para visualizar a lista de produtores cadastrados.</p>

        <form id="loginForm" class="auth-form">
          <label>
            <span>Senha</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="Digite a senha" required />
          </label>

          <div class="actions">
            <button type="submit">Entrar</button>
            <p id="loginMessage" class="message" aria-live="polite"></p>
          </div>
        </form>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
